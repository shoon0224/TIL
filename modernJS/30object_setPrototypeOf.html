<!DOCTYPE html>
<html>
    <script>
        //setPrototypeOf ~~의 프로토타입으로 셋팅한다. 라는 메소드

        const healthObj = {
            showHealth : function(){
                console.log("오늘 운동시간 : " + this.healthTime);
            },
            setHealth : function(newTime) {
                this.healthTime = newTime;
            }
        }
            
        const newobj =  Object.setPrototypeOf({
            name : "hoon",
            lastTIme : "11:20"
        },healthObj);

        console.log(newobj);
    </script>
</html>
