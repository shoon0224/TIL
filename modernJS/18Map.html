<!DOCTYPE html>
<html>
    <script>
        //map & WeakMap
        //Array--> set //Array를 조금더 개선한 자료구조가 set
        //Object --> weakmap(Object에서 특정한 용도로 사용하려는 것 map)

        //map은 key/value구조 어떤 객체만 저장하는 것이 아니고 객체에 대한 부연적인 설명을 같이 보관한다.
        // 특이하게 key값에 객체를 저장한다.

        let wm = new WeakMap();
        let myfun = function(){};
        //이 함수가 얼마나 실행됐지?를 알려고 할 때.


        wm.set(myfun, 0);
        console.log(wm);


        let count = 0;
        for (let i=0; i<10; i++){
            count = wm.get(myfun) //get value
            count++;
            wm.set(myfun, count);
        }
        console.log(wm.get(myfun));

        myfun = null;
        console.log(wm.has(myfun)); //false

        //WeakSet은 WeakMap과 상당히 유사하고 key value구조로 어떤 추가적인 정보를 넣을 때 유용하다.
    </script>
</html>
