<!DOCTYPE html>
<html>
    <body>
        <ul>
            <li>apple</li>
            <li>orange</li>
            <li>banana</li>
            <li>strawberry</li>
        </ul>
    </body>
</html>
<script>
    function print(){
        // filter, includes, from을 사용해서 문자열 'e'가 포함된 노드로 구성된 배열만들어서 반환
        let list = document.querySelectorAll("li");
        let listArray = Array.from(list);//li노드로 구성된 배열
        let eArray = listArray.filter(function(v) {
            return v.innerText.includes("e");
        });
        return eArray;
        
    }
    console.log(print());
</script>
