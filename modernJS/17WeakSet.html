<!DOCTYPE html>
<html>
    <script>
        //WeakSet
        //참조를 가지고 있는 객체만 저장이 가능하다.
        //객체형태를 중복없이 저장하려고 할때 유용하다.

        let arr = [1,2,3,4];
        let arr2 = [5,6,7,8];
        let obj = {arr, arr2};
        let ws = new WeakSet();

        ws.add(arr); // 1,2,3,4라는 값을 참조하고있다.
        // ws.add(111); 아무것도 참조 안하고있는것들
        // ws.add("111"); 아무것도 참조 안하고있는것들
        // ws.add(null); 아무것도 참조 안하고있는것들
        //ws.add(function(){}); // 함수는 참조중인것이다.
        ws.add(arr2);
        ws.add(obj);

        arr = null;
        arr2 = null;

        console.log(ws);// 값은 출력이 된다.
        console.log(ws.has(arr), ws.has(arr2));//하지만 결과는 펄스
    </script>
</html>
